name: Auto-trigger release pipeline on PR merge

# PROCESS
#
# Two manual triggers remain in an otherwise-automated release pipeline:
# 1. After `make-version.yml`'s version-bump PR (branch `ci-bump-<run_id>`) is merged,
#    a maintainer has to manually trigger `make-release.yml`.
# 2. After `publish_layer.yml`'s ARN-doc PR (branch `ci-layer-docs-<run_id>`) is merged,
#    a maintainer has to manually trigger `rebuild_latest_docs.yml` with the released version.
#
# This workflow watches for those two PRs merging to `main` and dispatches the next
# workflow automatically, so the only human actions left are the ones that require
# actual review: approving the version PR, approving npm publish, and approving the
# final ARN-doc PR.
#
# SECURITY NOTE
#
# Deliberately uses `pull_request` (not `pull_request_target`), so PRs from forks keep
# GitHub's default read-only token and no secrets - a forked PR could never reach the
# `gh workflow run` step even if every other condition below matched.
#
# `github.event.pull_request.user.login` is set by GitHub from the identity that actually
# called the API to open the PR - it isn't spoofable via branch name, PR title, or body.
# Both `ci-bump-*` and `ci-layer-docs-*` PRs are opened by aws-powertools/actions'
# `create-pr` action using the default `GITHUB_TOKEN`, so `.user.login` is always
# `github-actions[bot]` (confirmed against real PR history - this is NOT the same as
# `aws-powertools-bot`, which is only the git commit-author identity `create-pr` sets
# locally via `git config`, not what GitHub exposes as the PR's author).
#
# Combined with `head.repo.full_name == github.repository` (rejects forks explicitly)
# and `base.ref == 'main'`, only genuine automation-opened, same-repo, main-targeted
# PRs can reach the dispatch step.

on:
  pull_request:
    types: [closed]

permissions: {}

jobs:
  trigger-make-release:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'ci-bump-')
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Dispatch Make Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run make-release.yml --repo ${{ github.repository }} --ref main

  trigger-rebuild-docs:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == 'github-actions[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'ci-layer-docs-')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
      - name: Resolve latest published version
        id: version
        run: echo "version=$(cat packages/commons/package.json | jq .version -r)" >> "$GITHUB_OUTPUT"
      - name: Dispatch Rebuild latest docs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: gh workflow run rebuild_latest_docs.yml --repo ${{ github.repository }} --ref main --field latest_published_version="$VERSION"
