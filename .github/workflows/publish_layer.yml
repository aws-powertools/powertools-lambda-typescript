name: Deploy layer to all regions

permissions: {}

on:
  # Manual trigger
  workflow_dispatch:
    inputs:
      latest_published_version:
        description: "Latest npm published version to rebuild corresponding layer for, e.g. 1.0.2"
        default: "1.0.2"
        required: true

  workflow_call:
    secrets:
      AWS_LAYERS_BETA_ROLE_ARN:
        description: "Role ARN for deploying the Layer to Beta"
      AWS_LAYERS_PROD_ROLE_ARN:
        description: "Role ARN for deploying the Layer to Prod"
      AWS_IAM_ROLE:
        description: "Role ARN for reading the layer version from the main partition (us-east-1) to copy into GovCloud/China"
    inputs:
      latest_published_version:
        type: string
        description: "Latest npm published version to rebuild latest docs for, e.g. 2.0.0, 2.0.0a1 (pre-release)"
        required: true
      pre_release:
        description: "Publishes documentation using a pre-release tag (2.0.0a1)."
        default: false
        type: boolean
        required: false

jobs:
  # Build layer by running cdk synth in layer-publisher directory and uploading cdk.out for deployment
  build-layer:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    if: ${{ (github.event.workflow_run.conclusion == 'success') || (github.event_name == 'workflow_dispatch') }}
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
      - name: Setup dependencies
        uses: aws-powertools/actions/.github/actions/cached-node-modules@29979bc5339bf54f76a11ac36ff67701986bb0f0
      - name: CDK build
        env:
          LAYER_VERSION: ${{ inputs.latest_published_version }}
        run: npm run cdk -w layers -- synth --context PowertoolsPackageVersion=$LAYER_VERSION -o cdk.out
      - name: Zip output
        run: zip -r cdk.out.zip layers/cdk.out
      - name: Archive CDK artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cdk-layer-artifact
          path: cdk.out.zip

  # Deploy layer to all regions in beta account
  deploy-beta:
    needs:
      - build-layer
    uses: ./.github/workflows/reusable_deploy_layer_stack.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: "BETA"
      artifact-name: "cdk-layer-artifact"
      latest_published_version: ${{ inputs.latest_published_version }}
    secrets:
      target-account-role: ${{ secrets.AWS_LAYERS_BETA_ROLE_ARN }}

  # Deploy layer to all regions in prod account
  deploy-prod:
    needs:
      - deploy-beta
    uses: ./.github/workflows/reusable_deploy_layer_stack.yml
    permissions:
      id-token: write
      contents: read
    with:
      stage: "PROD"
      artifact-name: "cdk-layer-artifact"
      latest_published_version: ${{ inputs.latest_published_version }}
    secrets:
      target-account-role: ${{ secrets.AWS_LAYERS_PROD_ROLE_ARN }}

  update-ssm-prod:
    needs: [deploy-prod]
    uses: ./.github/workflows/update_ssm.yml
    permissions:
      contents: write
      id-token: write
    with:
      environment: prod
      write_latest: ${{ !inputs.pre_release }}
      package_version: ${{ inputs.latest_published_version }}
      layer-version: ${{ needs.deploy-prod.outputs.layer-version }}
    secrets:
      # We use "inherit" because need to propagate the secrets to the reusable workflow, secrets are already scoped by using GitHub's deployment environments to mitigate the risk of secret exposure.
      inherit

  # Downloads the layer version that was just deployed to Prod so it can be copied into the GovCloud/China partitions.
  # Unlike layers_partitions.yml's `download` job, the version is taken directly from deploy-prod's output rather than
  # discovered via `aws lambda list-layer-versions`, since we already know exactly which version was just deployed.
  download-layer:
    needs: [deploy-prod]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: Prod (Readonly)
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE }}
          aws-region: us-east-1
          mask-aws-account-id: true
      - name: Grab Zip
        env:
          VERSION: ${{ needs.deploy-prod.outputs.layer-version }}
        run: |
          set -euo pipefail
          aws --region us-east-1 lambda get-layer-version-by-arn --arn "arn:aws:lambda:us-east-1:094274105915:layer:AWSLambdaPowertoolsTypeScriptV2:${VERSION}" --query 'Content.Location' | xargs curl -L -o AWSLambdaPowertoolsTypeScriptV2.zip
          aws --region us-east-1 lambda get-layer-version-by-arn --arn "arn:aws:lambda:us-east-1:094274105915:layer:AWSLambdaPowertoolsTypeScriptV2:${VERSION}" > AWSLambdaPowertoolsTypeScriptV2.json
      - name: Store Zip
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: AWSLambdaPowertoolsTypeScriptV2.zip
          path: AWSLambdaPowertoolsTypeScriptV2.zip
          retention-days: 1
          if-no-files-found: error
      - name: Store Metadata
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: AWSLambdaPowertoolsTypeScriptV2.json
          path: AWSLambdaPowertoolsTypeScriptV2.json
          retention-days: 1
          if-no-files-found: error

  deploy-govcloud-gamma:
    name: Deploy GovCloud Gamma Layer
    needs: [download-layer]
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/layers_partitions_deploy.yml
    with:
      environment: Gamma
      partition: GovCloud
      arn_partition: aws-us-gov
      regions: '["us-gov-east-1", "us-gov-west-1"]'
      aud: sts.amazonaws.com
    secrets: inherit

  deploy-govcloud-prod:
    name: Deploy GovCloud Prod Layer
    needs: [download-layer, deploy-govcloud-gamma]
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/layers_partitions_deploy.yml
    with:
      environment: Prod
      partition: GovCloud
      arn_partition: aws-us-gov
      regions: '["us-gov-east-1", "us-gov-west-1"]'
      aud: sts.amazonaws.com
    secrets: inherit

  deploy-china-gamma:
    name: Deploy China Gamma Layer
    needs: [download-layer]
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/layers_partitions_deploy.yml
    with:
      environment: Gamma
      partition: China
      arn_partition: aws-cn
      regions: '["cn-north-1"]'
      aud: sts.amazonaws.com.cn
    secrets: inherit

  deploy-china-prod:
    name: Deploy China Prod Layer
    needs: [download-layer, deploy-china-gamma]
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/layers_partitions_deploy.yml
    with:
      environment: Prod
      partition: China
      arn_partition: aws-cn
      regions: '["cn-north-1"]'
      aud: sts.amazonaws.com.cn
    secrets: inherit

  update_layer_arn_docs:
    needs: [deploy-prod, deploy-govcloud-prod, deploy-china-prod]
    # Force Github action to run only a single job at a time (based on the group name)
    # This is to prevent race-condition and inconsistencies with changelog push
    concurrency:
      group: changelog-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: none
    steps:
      - name: Checkout repository # reusable workflows start clean, so we need to checkout again
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ github.sha }}
      - name: Replace layer versions in documentation
        run: |
          ./.github/scripts/update_layer_arn.sh ${{ needs.deploy-prod.outputs.layer-version }}
      - name: Stage changes
        run: git add .
      - name: Create PR
        id: create-pr
        uses: aws-powertools/actions/.github/actions/create-pr@4bf64a4072489399fbf39b78f558eeeed6767189 # v1.5.2
        with:
          temp_branch_prefix: 'ci-layer-docs'
          pull_request_title: 'chore(ci): update layer ARN on documentation'
          github_token: ${{ secrets.GITHUB_TOKEN }}
