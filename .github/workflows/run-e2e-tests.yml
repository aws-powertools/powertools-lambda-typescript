name: Run e2e Tests

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run-e2e-tests-on-utils:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: dev
    environment: e2e-tests
    permissions:
      id-token: write # needed to interact with GitHub's OIDC Token endpoint.
      contents: read
    strategy:
      max-parallel: 25
      matrix:
        package:
          [
            packages/idempotency,
            packages/logger,
            packages/metrics,
            packages/parameters,
            packages/event-handler,
            packages/tracer,
            packages/batch,
            packages/data-masking,
            layers,
          ]
        version: [22, 24]
        arch: [x86_64, arm64]
      fail-fast: false
    steps:
      - name: Checkout Repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
      - name: Setup dependencies
        uses: aws-powertools/actions/.github/actions/cached-node-modules@3b5b8e2e58b7af07994be982e83584a94e8c76c5 # v1.5.0
        with:
          node-version: 24
      - name: Setup AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ secrets.E2E_IAM_ROLE_ARN }}
          aws-region: eu-west-1
          mask-aws-account-id: true
      - name: Run e2e ${{ matrix.package }}-${{ matrix.version }}-${{ matrix.arch }}
        env:
          RUNTIME: nodejs${{ matrix.version }}x
          CI: true
          ARCH: ${{ matrix.arch }}
          JSII_SILENCE_WARNING_DEPRECATED_NODE_VERSION: true
          RUNNER_DEBUG: ${{ env.RUNNER_DEBUG }}
        run: npm run test:e2e -w ${{ matrix.package }}